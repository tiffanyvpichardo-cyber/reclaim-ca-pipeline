name: Weekly CA SCO ingest

# Runs automatically once a week, and can be run on demand from the Actions tab.
on:
  schedule:
    # Fridays 14:00 UTC (~6-7am PT) — after the SCO's Thursday refresh.
    # Edit this cron to change the day/time. https://crontab.guru explains it.
    - cron: "0 14 * * 5"
  workflow_dispatch: {}   # the "Run workflow" button for manual runs

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download SCO data and ingest new leads
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Optional tuning — set these as repo "Variables" to override the defaults:
          SCO_DATA_BAND:        ${{ vars.SCO_DATA_BAND || '500+' }}
          MIN_PROPERTY_VALUE:   ${{ vars.MIN_PROPERTY_VALUE || '500' }}
          INGEST_MAX_NEW:       ${{ vars.INGEST_MAX_NEW || '500' }}
        run: python sco_to_supabase.py --download
