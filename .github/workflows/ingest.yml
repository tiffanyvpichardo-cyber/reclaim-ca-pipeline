name: Weekly CA SCO ingest

on:
  schedule:
    - cron: "0 14 * * 5"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download SCO data and ingest new leads
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SCO_DATA_BAND:        ${{ vars.SCO_DATA_BAND || '500+' }}
          MIN_PROPERTY_VALUE:   ${{ vars.MIN_PROPERTY_VALUE || '500' }}
          INGEST_MAX_NEW:       ${{ vars.INGEST_MAX_NEW || '500' }}
        run: python sco_to_supabase.py --download
